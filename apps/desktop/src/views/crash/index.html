<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peektrace</title>
    <link rel="stylesheet" href="index.css">
  </head>
  <body>
    <div class="titlebar electrobun-webkit-app-region-drag"></div>
    <main class="card">
      <div class="icon" aria-hidden="true">&#9888;&#65039;</div>
      <h1>The local Peektrace server stopped unexpectedly</h1>
      <p>Your data is safe. Restart the server to keep working.</p>
      <div class="row">
        <button id="restart" type="button">Restart server</button>
      </div>
      <p id="status"></p>
    </main>
    <script type="module" src="index.js"></script>
  </body>
</html>

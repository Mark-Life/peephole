name: Publish CLI

run-name: "publish cli ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"

# Publishes the `peektrace` npm CLI. A push of a `cli-v<semver>` tag drives an
# automatic publish; workflow_dispatch stays available for repair runs. The tag
# is the source of truth for the version: the workflow strips `cli-v`, stamps
# the bare semver into apps/cli/package.json, then build:npm cross-compiles all
# four platform binaries on this one host and stages them under dist-npm/.
#
# npm layout (see apps/cli/scripts/build-npm.ts): four unscoped per-platform
# packages `peektrace-<platform>-<arch>` (each os/cpu-filtered) plus the
# `peektrace` wrapper whose optionalDependencies pin those variants at the exact
# version. The variants MUST publish before the wrapper so its optional deps
# resolve.
#
# The SAME staged binaries are also published as raw assets on the GitHub
# Release for the tag (peektrace-darwin-arm64, peektrace-darwin-x64,
# peektrace-linux-x64, peektrace-windows-x64.exe + a SHA256SUMS), which the
# native curl|sh / irm|iex installers (install.sh, install.ps1) download. The
# job runs on macOS so both darwin binaries can be ad-hoc codesigned (free, no
# Apple account) — without a signature a cross-compiled arm64 binary is
# 'killed: 9' by the kernel on first launch.

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. cli-v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # macOS runner so both darwin binaries can be ad-hoc codesigned before
    # release (see header). Bun cross-compiles all four targets from here.
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Derive version from tag
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RAW_TAG#cli-v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "::error::Tag '$RAW_TAG' does not yield a valid semver (got '$VERSION'). Expected cli-v<semver>." >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$RAW_TAG" >> "$GITHUB_ENV"
          echo "Publishing peektrace@$VERSION ($RAW_TAG)"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Stamp AFTER install so the frozen lockfile check sees the committed
      # version. build-npm.ts re-reads apps/cli/package.json at build time and
      # stamps VERSION into the wrapper, every variant, and the wrapper's
      # optionalDependencies, so they all match.
      - name: Stamp CLI version
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: apps/cli

      - name: Build inspector UI
        run: bun run --filter=inspector build

      - name: Stage npm packages
        run: bun run --filter=peektrace build:npm

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          # Idempotent publish: skip if the exact name@version already exists,
          # and treat a race where npm reports it as already published as
          # success — so a partially-failed run is safe to retry.
          publish_dir() {
            local dir="$1"
            local name version
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "Skip: $name@$version already published."
              return 0
            fi
            echo "Publishing $name@$version"
            local out
            if out="$(npm publish "$dir" --access public 2>&1)"; then
              printf '%s\n' "$out"
              return 0
            fi
            printf '%s\n' "$out"
            if printf '%s' "$out" | grep -Eqi 'previously published|cannot publish over|version already exists'; then
              echo "Treating as already published: $name@$version"
              return 0
            fi
            return 1
          }

          # Per-platform variants FIRST (sequentially — the registry 409s on
          # concurrent packument writes), then the wrapper LAST so its
          # optionalDependencies already exist in the registry.
          for d in apps/cli/dist-npm/peektrace-*; do
            publish_dir "$d"
          done
          publish_dir "apps/cli/dist-npm/peektrace"

      # Collect the four already-compiled binaries from the staged npm packages
      # and rename them to the SHARED-CONTRACT release-asset names the installers
      # (install.sh / install.ps1) download.
      - name: Collect release binaries
        shell: bash
        run: |
          set -euo pipefail
          DIST=apps/cli/dist-npm
          mkdir -p release
          cp "$DIST/peektrace-darwin-arm64/bin/peektrace"    release/peektrace-darwin-arm64
          cp "$DIST/peektrace-darwin-x64/bin/peektrace"      release/peektrace-darwin-x64
          cp "$DIST/peektrace-linux-x64/bin/peektrace"       release/peektrace-linux-x64
          cp "$DIST/peektrace-win32-x64/bin/peektrace.exe"   release/peektrace-windows-x64.exe
          chmod +x release/peektrace-darwin-arm64 release/peektrace-darwin-x64 release/peektrace-linux-x64
          ls -l release

      # Ad-hoc sign BOTH darwin binaries (free, no Apple account). A
      # cross-compiled unsigned arm64 binary is 'killed: 9' on first launch;
      # signing here + curl-install (no quarantine attr) means it just runs.
      - name: Ad-hoc codesign macOS binaries
        shell: bash
        run: |
          set -euo pipefail
          for bin in release/peektrace-darwin-arm64 release/peektrace-darwin-x64; do
            codesign --sign - --force --timestamp=none "$bin"
            codesign --verify --verbose "$bin"
          done

      # Checksums the installers verify. Lines: "<sha256>  <asset>".
      - name: Generate SHA256SUMS
        working-directory: release
        run: shasum -a 256 peektrace-* > SHA256SUMS

      # Create the Release for this tag if missing, then (re)upload every asset.
      - name: Publish GitHub Release with raw binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
          gh release upload "$TAG" \
            release/peektrace-darwin-arm64 \
            release/peektrace-darwin-x64 \
            release/peektrace-linux-x64 \
            release/peektrace-windows-x64.exe \
            release/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" --clobber
